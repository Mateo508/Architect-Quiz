<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Architect Personality Quiz</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="start-screen" class="screen active">
        <h1>Which Architect Are You?</h1>
        <button id="start-btn" class="btn">Begin Quiz</button>
    </div>

    <div id="quiz-screen" class="screen">
        <div id="question-container">
            <h2 id="question"></h2>
            <ul id="options" class="options"></ul>
        </div>
        <div class="controls">
            <span id="progress"></span>
            <button id="next-btn" class="btn" disabled>Next</button>
        </div>
    </div>

    <div id="result-screen" class="screen">
        <h2 id="result-title"></h2>
        <img id="result-img" alt="Architect image" />
        <p id="result-bio"></p>
        <button id="restart-btn" class="btn">Retake Quiz</button>
    </div>

<script src="script.js"></script>
</body>
</html>
